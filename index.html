<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Choose between two MSR Engineering Works website options.">
  <title>MSR Website Options</title>
  <style>
    :root {
      --bg: #0b1520;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #ecf2f8;
      --muted: #a8b7c6;
      --accent: #f07d2f;
      --accent-dark: #ca611a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(240, 125, 47, 0.24), transparent 28%),
        linear-gradient(135deg, #08111a 0%, #0d1a28 50%, #132435 100%);
    }

    .card {
      width: min(100%, 720px);
      padding: 40px 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
    }

    .eyebrow {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin-top: 14px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
    }

    p {
      margin: 16px auto 0;
      max-width: 54ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .button {
      min-width: 200px;
      padding: 16px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .button:hover,
    .button:focus-visible {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    .button.secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .button.secondary:hover,
    .button.secondary:focus-visible {
      background: rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">MSR Engineering Works</div>
    <h1>Select a website option</h1>
    <p>
      Use the buttons below to open either version of the website and compare the two options before choosing the final direction.
    </p>

    <div class="actions">
      <a class="button" href="MSR.html">Option 1</a>
      <a class="button secondary" href="MSR2.html">Option 2</a>
    </div>
  </main>
</body>
</html>
